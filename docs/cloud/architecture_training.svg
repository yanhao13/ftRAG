<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">Hybrid training pipeline: Colab T4 + GKE Autopilot</text>
  <text x="350" y="52" text-anchor="middle" font-size="12" fill="#6b7280">LoRA fine-tuning on Colab, offline merge and supervised ensemble on GKE, artifacts on Cloud Storage</text>

  <!-- 1. Data bucket -->
  <rect x="40" y="90" width="240" height="80" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="160" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Cloud Storage: ftrag-data</text>
  <text x="160" y="138" text-anchor="middle" font-size="12" fill="#1e3a8a">FinAgentBench dev/eval JSONL</text>
  <text x="160" y="156" text-anchor="middle" font-size="12" fill="#1e3a8a">document and chunk ranking</text>

  <!-- 1b. Cache bucket -->
  <rect x="420" y="90" width="240" height="80" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="540" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Cloud Storage: ftrag-cache</text>
  <text x="540" y="138" text-anchor="middle" font-size="12" fill="#1e3a8a">Cached supervised rankers</text>
  <text x="540" y="156" text-anchor="middle" font-size="12" fill="#1e3a8a">models.joblib, feature packs</text>

  <!-- 2. Colab training (NEW: Colab T4, not GKE) -->
  <rect x="40" y="220" width="240" height="100" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="160" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Colab notebook: lora-train</text>
  <text x="160" y="268" text-anchor="middle" font-size="12" fill="#92400e">NVIDIA T4 GPU, pay-as-you-go</text>
  <text x="160" y="286" text-anchor="middle" font-size="12" fill="#92400e">python3 lora_reranker.py</text>
  <text x="160" y="304" text-anchor="middle" font-size="12" fill="#92400e">unsloth/Llama-3.2-1B-Instruct + LoRA</text>

  <!-- 2b. Ensemble pod (CPU on GKE) -->
  <rect x="420" y="220" width="240" height="100" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="540" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#4c1d95">GKE pod: chunk-ensemble</text>
  <text x="540" y="268" text-anchor="middle" font-size="12" fill="#4c1d95">CPU only, 4 vCPU / 16 GiB</text>
  <text x="540" y="286" text-anchor="middle" font-size="12" fill="#4c1d95">python3 chunk_best_ensemble.py</text>
  <text x="540" y="304" text-anchor="middle" font-size="12" fill="#4c1d95">supervised LightGBM ranker blend</text>

  <!-- 3. Adapter bucket -->
  <rect x="40" y="370" width="240" height="80" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="160" y="398" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Cloud Storage: ftrag-adapters</text>
  <text x="160" y="418" text-anchor="middle" font-size="12" fill="#1e3a8a">LoRA adapter + tokenizer</text>
  <text x="160" y="436" text-anchor="middle" font-size="12" fill="#1e3a8a">metrics.json (LoRA-only)</text>

  <!-- 4. Merged + ensemble output bucket -->
  <rect x="420" y="370" width="240" height="80" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="540" y="398" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Cloud Storage: ftrag-merged</text>
  <text x="540" y="418" text-anchor="middle" font-size="12" fill="#1e3a8a">Merged HF checkpoint +</text>
  <text x="540" y="436" text-anchor="middle" font-size="12" fill="#1e3a8a">metrics_best_ensemble.json</text>

  <!-- Headline metrics box -->
  <rect x="200" y="475" width="300" height="50" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="350" y="497" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Headline result on chunk ranking (n=500)</text>
  <text x="350" y="514" text-anchor="middle" font-size="12" fill="#14532d">nDCG@5 0.432 &#8226; MAP@5 0.391 &#8226; MRR@5 0.640</text>

  <!-- Arrows -->
  <line x1="160" y1="170" x2="160" y2="218" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="540" y1="170" x2="540" y2="218" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="160" y1="320" x2="160" y2="368" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="540" y1="320" x2="540" y2="368" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="280" y1="410" x2="418" y2="410" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="349" y="402" text-anchor="middle" font-size="11" fill="#6b7280">GKE merge pod</text>
  <line x1="350" y1="450" x2="350" y2="473" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="478" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb"/>
  <text x="60" y="490" font-size="11" fill="#374151">Storage</text>
  <rect x="40" y="498" width="14" height="14" rx="3" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="60" y="510" font-size="11" fill="#374151">GKE compute</text>
  <rect x="40" y="518" width="14" height="14" rx="3" fill="#fef3c7" stroke="#d97706"/>
  <text x="60" y="530" font-size="11" fill="#374151">Colab compute</text>
</svg>
