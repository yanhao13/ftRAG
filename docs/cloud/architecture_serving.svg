<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">Future work: serving pipeline</text>
  <text x="350" y="52" text-anchor="middle" font-size="12" fill="#6b7280">vLLM reranker on GKE GPU, retrieval over a vector DB, fronted by Cloud Load Balancer</text>

  <!-- User -->
  <rect x="20" y="170" width="120" height="60" rx="12" fill="#f3f4f6" stroke="#374151" stroke-width="1.5"/>
  <text x="80" y="198" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">User</text>
  <text x="80" y="216" text-anchor="middle" font-size="12" fill="#374151">analyst question</text>

  <!-- Cloud LB -->
  <rect x="170" y="170" width="140" height="60" rx="12" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="240" y="198" text-anchor="middle" font-size="14" font-weight="bold" fill="#78350f">Cloud Load Balancer</text>
  <text x="240" y="216" text-anchor="middle" font-size="12" fill="#78350f">HTTPS, public IP</text>

  <!-- Frontend pod -->
  <rect x="330" y="80" width="200" height="80" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="430" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#4c1d95">GKE pod: frontend</text>
  <text x="430" y="128" text-anchor="middle" font-size="12" fill="#4c1d95">orchestrates retrieve + rerank</text>
  <text x="430" y="146" text-anchor="middle" font-size="12" fill="#4c1d95">FastAPI / serving glue</text>

  <!-- Retriever pod / Vector DB -->
  <rect x="330" y="180" width="200" height="80" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="430" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#4c1d95">Retriever: Vector DB</text>
  <text x="430" y="228" text-anchor="middle" font-size="12" fill="#4c1d95">top-k chunks per question</text>
  <text x="430" y="246" text-anchor="middle" font-size="12" fill="#4c1d95">k = 50 by default</text>

  <!-- vLLM reranker pod -->
  <rect x="330" y="280" width="200" height="80" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="430" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#4c1d95">GKE pod: vLLM reranker</text>
  <text x="430" y="328" text-anchor="middle" font-size="12" fill="#4c1d95">NVIDIA L4 GPU</text>
  <text x="430" y="346" text-anchor="middle" font-size="12" fill="#4c1d95">loads merged model from GCS</text>

  <!-- Merged model bucket -->
  <rect x="560" y="280" width="120" height="80" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="620" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">Cloud Storage</text>
  <text x="620" y="326" text-anchor="middle" font-size="12" fill="#1e3a8a">ftrag-merged</text>
  <text x="620" y="344" text-anchor="middle" font-size="12" fill="#1e3a8a">merged Llama+LoRA</text>

  <!-- Arrows -->
  <line x1="140" y1="200" x2="168" y2="200" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <line x1="310" y1="190" x2="328" y2="140" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <line x1="430" y1="160" x2="430" y2="178" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <text x="438" y="172" font-size="11" fill="#6b7280">retrieve</text>
  <line x1="430" y1="260" x2="430" y2="278" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <text x="438" y="272" font-size="11" fill="#6b7280">rerank</text>
  <line x1="558" y1="320" x2="532" y2="320" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <text x="540" y="312" font-size="11" fill="#6b7280">load on start</text>
  <path d="M 328 120 Q 240 80 240 168" stroke="#374151" stroke-width="1.6" fill="none" marker-end="url(#arrow2)"/>
  <text x="180" y="100" font-size="11" fill="#6b7280">ranked answer</text>

  <!-- Legend -->
  <rect x="20" y="370" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb"/>
  <text x="40" y="382" font-size="11" fill="#374151">Storage</text>
  <rect x="100" y="370" width="14" height="14" rx="3" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="120" y="382" font-size="11" fill="#374151">Compute</text>
  <rect x="180" y="370" width="14" height="14" rx="3" fill="#fef3c7" stroke="#b45309"/>
  <text x="200" y="382" font-size="11" fill="#374151">Networking</text>
</svg>
